<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fussball Commander - Turn Based</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; flex-direction: column; gap: 10px; }
  canvas { border: 2px solid #fff; cursor: crosshair; }
  #score {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    color: #fff; font: bold 28px monospace; text-shadow: 0 0 10px rgba(0,0,0,.8);
    z-index: 10; pointer-events: none;
  }
  #round-info {
    position: fixed; top: 55px; left: 50%; transform: translateX(-50%);
    color: #ccc; font: 16px monospace; z-index: 10; pointer-events: none;
  }
  #info-btn {
    position: fixed; top: 15px; left: 20px;
    z-index: 11; background: rgba(255,255,255,0.15); color: #ccc; border: 1px solid #555;
    font: 12px monospace; padding: 4px 10px; border-radius: 4px; cursor: pointer;
  }
  #info-btn:hover { background: rgba(255,255,255,0.25); }
  #info {
    position: fixed; top: 42px; left: 20px;
    color: #ccc; font: 12px monospace; z-index: 10; pointer-events: none;
    text-align: left; line-height: 1.7; display: none;
    background: rgba(20, 20, 40, 0.95); padding: 10px 14px; border-radius: 6px; border: 1px solid #444;
  }
  #play-btn {
    position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
    z-index: 10; background: #4CAF50; color: #fff; border: none;
    font: bold 20px monospace; padding: 12px 40px; border-radius: 8px;
    cursor: pointer; transition: all 0.2s;
  }
  #play-btn:hover { background: #66BB6A; transform: translateX(-50%) scale(1.05); }
  #play-btn:disabled { background: #555; cursor: not-allowed; transform: translateX(-50%); }
  #timer-bar {
    position: fixed; top: 85px; left: 50%; transform: translateX(-50%);
    width: 300px; height: 8px; background: #333; border-radius: 4px;
    z-index: 10; overflow: hidden; display: none;
  }
  #timer-fill {
    height: 100%; background: #4CAF50; border-radius: 4px; transition: width 0.05s linear;
  }
</style>
</head>
<body>
<div id="score">0 : 0</div>
<div id="round-info">Round 1 — Plan your moves</div>
<div id="timer-bar"><div id="timer-fill"></div></div>
<canvas id="c"></canvas>
<button id="play-btn">▶ PLAY</button>
<button id="info-btn" onclick="document.getElementById('info').style.display = document.getElementById('info').style.display === 'none' ? 'block' : 'none'">Instructions</button>
<div id="info">
  &bull; Left-drag any player to move them<br>
  &bull; Right-drag from ball carrier to pass or shoot<br>
  &bull; Left-drag to dribble, then right-drag from destination to pass<br>

</div>

const SPRITES = makeSprites();
const SPRITE_SCALE = 1.2; // each pixel = 1.2 canvas pixels

// Pre-render sprites to offscreen canvases for performance
const spriteCache = {};

function getSpriteKey(sprite, palette) {
  // Use leg rows (14-18) to differentiate run frames, plus palette color
  return palette[1] + '_' + sprite[14].join('') + sprite[16].join('') + sprite[18].join('');
}

function renderSpriteToCanvas(sprite, palette) {
  const size = 24;
  const scale = SPRITE_SCALE;
  const c = document.createElement('canvas');
  c.width = Math.ceil(size * scale);
  c.height = Math.ceil(size * scale);
  const sctx = c.getContext('2d');
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      const idx = sprite[y][x];
      if (idx === 0) continue;
      sctx.fillStyle = palette[idx];
      sctx.fillRect(Math.floor(x * scale), Math.floor(y * scale), Math.ceil(scale), Math.ceil(scale));
    }
  }
  return c;
}

function getCachedSprite(sprite, palette) {
  const key = getSpriteKey(sprite, palette);
  if (!spriteCache[key]) {
    spriteCache[key] = renderSpriteToCanvas(sprite, palette);
  }
  return spriteCache[key];
}

// Get player facing direction from movement
function getFacing(p) {
  const dx = p.tx - p.x;
  const dy = p.ty - p.y;
  const d = Math.sqrt(dx * dx + dy * dy);
  if (d < 3) return p._lastFacing || 'down';
  const angle = Math.atan2(dy, dx);
  // Snap to 4 directions
  if (angle > -Math.PI/4 && angle <= Math.PI/4) return 'right';
  if (angle > Math.PI/4 && angle <= 3*Math.PI/4) return 'down';
  if (angle > -3*Math.PI/4 && angle <= -Math.PI/4) return 'up';
  return 'left';
}

// Get animation state based on actual position change, not intent
function getAnimState(p) {
  if (p._kicking) return 'kick';
  // Compare to previous frame position — actual movement, not distance-to-target
  // Threshold must be higher than separation nudge to avoid jitter-triggered animation
  const dx = p.x - (p._prevX || p.x);
  const dy = p.y - (p._prevY || p.y);
  if (dx * dx + dy * dy > 4) return 'run';
  return 'idle';
}

// Draw a pixel sprite for a player
function drawPixelPlayer(p, palette) {
  const anim = getAnimState(p);
  const facing = getFacing(p);
  p._lastFacing = facing;
  const frames = SPRITES[anim][facing];
  const frameIdx = animFrame % frames.length;
  const sprite = frames[frameIdx];
  const cached = getCachedSprite(sprite, palette);
  const size = 24 * SPRITE_SCALE;
  // Draw centered on player position, shifted up so feet are at p.y
  ctx.drawImage(cached, p.x - size / 2, p.y - size + 6, size, size);
}

const formationBase = [
  [0.08, 0.5],   // GK
  [0.2, 0.15], [0.2, 0.38], [0.2, 0.62], [0.2, 0.85], // DEF
  [0.38, 0.12], [0.38, 0.38], [0.38, 0.62], [0.38, 0.88], // MID — wider spread
  [0.45, 0.28], [0.45, 0.72], // FWD — wider apart
];

let kickoffSide = 0; // 0 = team A kicks off, 1 = team B

function createTeam(side) {
  const isKickoff = side === kickoffSide;

  return formationBase.map((pos, i) => {
    let x = side === 0 ? pos[0] * W : W - pos[0] * W;
    let y = pos[1] * H;

    // Kickoff team: FWD 9 right next to ball, FWD 10 halfway to circle edge
    if (isKickoff && i === 9) {
      x = W / 2 + (side === 0 ? -2 : 2);
      y = H / 2 - 18;
    } else if (isKickoff && i === 10) {
      x = W / 2 + (side === 0 ? -2 : 2);
      y = H / 2 + 40;
    }

    // Non-kickoff team: ensure all players are outside the center circle
    if (!isKickoff) {
      const dx = x - W / 2, dy = y - H / 2;
      const d = Math.sqrt(dx * dx + dy * dy);
      const minDist = 220; // far outside center circle
      if (d < minDist) {
        // Push toward own half
        const pushX = side === 0 ? -1 : 1;
        x = W / 2 + pushX * minDist;
      }
    }

    return {
      x, y, tx: x, ty: y,
      homeX: x, homeY: y,
      speed: i === 0 ? 2.5 : 3.0 + Math.random() * 0.5,
      radius: 14,
      side,
      index: i,
      tackleCooldown: 0,
      tackleTarget: null,
      hasOrder: false,
      plannedPass: null,
      passFirst: false,
    };
  });
}

// Give kickoff possession to FWD 9 of the kickoff team
function setKickoffPossession() {
  const team = kickoffSide === 0 ? teamA : teamB;
  possession = team[9];
  ball.x = possession.x + possession.radius - 3;
  ball.y = possession.y;
  ball.vx = 0; ball.vy = 0;
}

function resetAfterGoal(concedingSide) {
  // Conceding team always kicks off
  kickoffSide = concedingSide;
  ball.x = W / 2; ball.y = H / 2;
  ball.vx = 0; ball.vy = 0;
  possession = null;
  passTarget = null;
  tackleCooldown = 0;
  goalScored = false;
  lastKicker = null;
  lastKickerCooldown = 0;
  teamA = createTeam(0);
  teamB = createTeam(1);

  selected = null;
  phase = 'plan';
  playBtn.disabled = false;
  updateRoundInfo();
}

let lastKicker = null;
let lastKickerCooldown = 0;

function kickBall(targetX, targetY, power) {
  const dx = targetX - ball.x, dy = targetY - ball.y;
  const dd = Math.sqrt(dx * dx + dy * dy);
  if (dd < 1) return;
  ball.vx = (dx / dd) * power * ballSpeedMult;
  ball.vy = (dy / dd) * power * ballSpeedMult;
  ball.x += (dx / dd) * 20;
  ball.y += (dy / dd) * 20;
  lastKicker = possession;
  lastKickerCooldown = 40;
  possession = null;
}

function dist(a, b) {
  const dx = a.x - b.x, dy = a.y - b.y;
  return Math.sqrt(dx * dx + dy * dy);
}

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

let dragging = null; // player being dragged from (for pass)

function getMousePos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (W / rect.width),
    y: (e.clientY - rect.top) * (H / rect.height),
  };
}

function playerAt(mx, my, team) {
  for (const p of team) {
    const dx = p.x - mx, dy = p.y - my;
    if (Math.sqrt(dx * dx + dy * dy) < p.radius + 6) return p;
  }
  return null;
}

let dragStartPos = null;
const DRAG_THRESHOLD = 10;
let dragActive = false;
let dragButton = -1; // 0 = left, 2 = right

canvas.addEventListener('mousedown', (e) => {
  if (phase !== 'plan') return;
  if (e.button !== 0 && e.button !== 2) return;
  const {x: mx, y: my} = getMousePos(e);

  // Right-drag from dribble destination = pass after dribble
  if (e.button === 2) {
    // Find ball carrier who has a dribble order — check if click is near their move target
    const carrier = teamA.find(p => possession === p);
    if (carrier && carrier.hasOrder && !carrier.plannedPass) {
      const dx = carrier.tx - mx, dy = carrier.ty - my;
      if (Math.sqrt(dx * dx + dy * dy) < 20) {
        dragging = carrier;
        dragStartPos = {x: carrier.tx, y: carrier.ty};
        dragMouse = {x: mx, y: my};
        dragActive = false;
        dragButton = 2;
        return;
      }
    }
    // Also allow right-drag directly from ball carrier
    if (carrier) {
      const dx = carrier.x - mx, dy = carrier.y - my;
      if (Math.sqrt(dx * dx + dy * dy) < carrier.radius + 6) {
        dragging = carrier;
        dragStartPos = {x: mx, y: my};
        dragMouse = {x: mx, y: my};
        dragActive = false;
        dragButton = 2;
        selected = carrier;
        return;
      }
    }
    return;
  }

  // Left-drag from any team A player
  const clickedA = playerAt(mx, my, teamA);
  if (clickedA) {
    dragging = clickedA;
    dragStartPos = {x: mx, y: my};
    dragMouse = {x: mx, y: my};
    dragActive = false;
    dragButton = 0;
    selected = clickedA;
  }
});

canvas.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  dragMouse = getMousePos(e);
  if (!dragActive && dragStartPos) {
    const dx = dragMouse.x - dragStartPos.x, dy = dragMouse.y - dragStartPos.y;
    if (Math.sqrt(dx * dx + dy * dy) > DRAG_THRESHOLD) {
      dragActive = true;
    }
  }
});

canvas.addEventListener('mouseup', (e) => {
  if (dragging && dragActive) {
    const {x: mx, y: my} = getMousePos(e);

    if (dragButton === 2 && possession === dragging) {
      // Right drag from ball carrier = pass/kick
      dragging.plannedPass = { x: mx, y: my };
      // If no dribble order yet, this is a "pass first" — mark it
      const hasDribble = dragging.hasOrder && (Math.abs(dragging.tx - dragging.x) > 5 || Math.abs(dragging.ty - dragging.y) > 5);
      if (!hasDribble) {
        dragging.passFirst = true;
      }
    } else if (dragButton === 0) {
      // Left drag = move order (works for all players including ball carrier = dribble)
      const dx = mx - dragging.x, dy = my - dragging.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d <= MOVE_RADIUS) {
        dragging.tx = mx;
        dragging.ty = my;
      } else {
        dragging.tx = dragging.x + (dx / d) * MOVE_RADIUS;
        dragging.ty = dragging.y + (dy / d) * MOVE_RADIUS;
      }
    }
    dragging.hasOrder = true;
    dragging = null;
    dragMouse = null;
    dragActive = false;
    dragStartPos = null;
    dragButton = -1;
    suppressClick = true;
    return;
  }
  dragging = null;
  dragMouse = null;
  dragActive = false;
  dragStartPos = null;
  dragButton = -1;
});

canvas.addEventListener('click', (e) => {
  if (suppressClick) { suppressClick = false; return; }
  if (phase !== 'plan') return;
  const {x: mx, y: my} = getMousePos(e);

  // Try selecting a player from team A
  const clickedTeammate = playerAt(mx, my, teamA);

  if (clickedTeammate) {
    selected = clickedTeammate;
    return;
  }

  // Check for clicking enemy with ball → tackle order
  if (selected) {
    const targetEnemy = playerAt(mx, my, teamB);

    if (targetEnemy && possession === targetEnemy) {
      selected.tackleTarget = targetEnemy;
      selected.tx = targetEnemy.x;
      selected.ty = targetEnemy.y;
      selected.hasOrder = true;
      return;
    }

    // Move order — clamp to radius
    const dx = mx - selected.x, dy = my - selected.y;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d <= MOVE_RADIUS) {
      selected.tx = mx;
      selected.ty = my;
    } else {
      selected.tx = selected.x + (dx / d) * MOVE_RADIUS;
      selected.ty = selected.y + (dy / d) * MOVE_RADIUS;
    }
    selected.hasOrder = true;
  }
});

  phase = 'play';
  playTimer = PLAY_DURATION;
  playBtn.disabled = true;
  timerBar.style.display = 'block';
  selected = null;

  // Store start positions for move radius enforcement
  for (const p of [...teamA, ...teamB]) {
    p._startX = p.x;
    p._startY = p.y;
  }

  // Execute planned passes
  for (const p of teamA) {
    if (p.plannedPass && possession === p) {
      if (p.passFirst) {
        // Pass first, then run — kick immediately, keep move target
        const pp = p.plannedPass;
        const passDist = Math.sqrt((pp.x - ball.x) ** 2 + (pp.y - ball.y) ** 2);
        const power = Math.max(6, passDist / 8);
        kickBall(pp.x, pp.y, power);
        p.plannedPass = null;
        p.passFirst = false;
      } else {
        const hasDribble = (Math.abs(p.tx - p.x) > 5 || Math.abs(p.ty - p.y) > 5);
        if (!hasDribble) {
          // No dribble — pass immediately
          const pp = p.plannedPass;
          const passDist = Math.sqrt((pp.x - ball.x) ** 2 + (pp.y - ball.y) ** 2);
          const power = Math.max(6, passDist / 8);
          kickBall(pp.x, pp.y, power);
          p.plannedPass = null;
        }
        // else: keep plannedPass, will execute when player arrives at dribble target
      }
    }
  }

  // AI plans its moves
  planAI();

  updateRoundInfo();
});

// Team mood system — picked each round based on game state + randomness
let aiMood = 'balanced';

function pickAIMood() {
  const scoreDiff = score[1] - score[0]; // positive = AI winning
  const ballInAIHalf = ball.x > W / 2;

  // Weight table: [pressing, counter, possession, parkbus]
  let w = [25, 25, 25, 25];

  if (scoreDiff < 0) { w[0] += 30; w[2] += 15; w[3] -= 15; } // losing: press more
  if (scoreDiff > 0) { w[3] += 25; w[1] += 15; w[0] -= 15; } // winning: sit back
  if (scoreDiff === 0 && round > 20) { w[0] += 20; w[2] += 10; } // late tie: push
  if (ballInAIHalf) { w[0] += 10; w[3] += 10; } // ball in our half: defensive bias
  if (!ballInAIHalf) { w[1] += 15; w[2] += 10; } // ball in their half: keep possession

  // Clamp negatives
  w = w.map(v => Math.max(5, v));
  const total = w.reduce((a, b) => a + b);
  let r = Math.random() * total;
  const moods = ['pressing', 'counter', 'possession', 'parkbus'];
  for (let i = 0; i < 4; i++) {
    r -= w[i];
    if (r <= 0) return moods[i];
  }
  return 'possession';
}

// Role helper: 0=GK, 1-4=DEF, 5-8=MID, 9-10=FWD
function aiRole(p) {
  if (p.index === 0) return 'gk';
  if (p.index <= 4) return 'def';
  if (p.index <= 8) return 'mid';
  return 'fwd';
}

// Find open space — pick a random point biased by zone, avoid clustering
function findSpace(p, zoneX, zoneY, spread) {
  let bestX = zoneX + (Math.random() - 0.5) * spread;
  let bestY = zoneY + (Math.random() - 0.5) * spread * 0.8;
  // Nudge away from nearest teammate
  for (const t of teamB) {
    if (t === p) continue;
    const dx = bestX - t.x, dy = bestY - t.y;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d < 80) {
      bestX += (dx / (d || 1)) * 30;
      bestY += (dy / (d || 1)) * 30;
    }
  }
  return { x: clamp(bestX, 30, W - 30), y: clamp(bestY, 30, H - 30) };
}

// Check if a teammate is "open" (no team A player within radius)
function isOpen(p, radius) {
  for (const a of teamA) {
    if (dist(a, p) < radius) return false;
  }
  return true;
}

// Distance from point (px,py) to line segment (ax,ay)-(bx,by)
function pointToSegDist(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  const lenSq = dx * dx + dy * dy;
  if (lenSq === 0) return Math.sqrt((px - ax) ** 2 + (py - ay) ** 2);
  const t = Math.max(0, Math.min(1, ((px - ax) * dx + (py - ay) * dy) / lenSq));
  return Math.sqrt((px - (ax + t * dx)) ** 2 + (py - (ay + t * dy)) ** 2);
}

// Check if any team A player is blocking the passing lane
function isPassLaneClear(from, to, blockRadius = 50) {
  for (const a of teamA) {
    if (pointToSegDist(a.x, a.y, from.x, from.y, to.x, to.y) < blockRadius) return false;
  }
  return true;
}

// Nearest team A player to a point
function nearestOpponent(x, y) {
  let best = null, bestD = Infinity;
  for (const a of teamA) {
    const d = Math.sqrt((a.x - x) ** 2 + (a.y - y) ** 2);
    if (d < bestD) { best = a; bestD = d; }
  }
  return { p: best, d: bestD };
}

function aiSetTarget(p, tx, ty) {
  const dx = tx - p.x, dy = ty - p.y;
  const d = Math.sqrt(dx * dx + dy * dy);
  if (d > MOVE_RADIUS) {
    p.tx = p.x + (dx / d) * MOVE_RADIUS;
    p.ty = p.y + (dy / d) * MOVE_RADIUS;
  } else {
    p.tx = tx; p.ty = ty;
  }
}

// Score an action for a player given mood — returns {action, score, target}
function scoreActions(p, mood) {
  const role = aiRole(p);
  const hasBall = possession === p;
  const teamHasBall = possession && possession.side === 1;
  const oppHasBall = possession && possession.side === 0;
  const actions = [];
  const noise = () => Math.random() * 20; // unpredictability

  // --- GK always special ---
  if (role === 'gk' && !hasBall) {
    const ty = clamp(ball.y, GOAL_Y + 20, GOAL_Y + GOAL_H - 20);
    actions.push({ action: 'hold', score: 100, tx: p.homeX, ty });
    // GK comes out for loose ball if very close
    if (!possession && dist(p, ball) < 150) {
      actions.push({ action: 'chase', score: 80 + noise(), tx: ball.x, ty: ball.y });
    }
    return actions;
  }

  // --- PRESS: close down ball carrier ---
  if (oppHasBall && role !== 'gk') {
    const dp = dist(p, possession);
    let pressScore = 30 + noise();
    if (mood === 'pressing') pressScore += 40;
    if (mood === 'counter') pressScore -= 10;
    if (mood === 'parkbus') pressScore -= 20;
    if (dp < 250) pressScore += 30; // closer = more likely to press
    if (role === 'fwd') pressScore += 10; // forwards press from front
    if (role === 'def' && dp > 300) pressScore -= 30; // defenders don't chase far
    actions.push({ action: 'press', score: pressScore, tx: possession.x, ty: possession.y, tackle: true });
  }

  // --- MARK: shadow nearest opponent ---
  if (oppHasBall && (role === 'def' || role === 'mid')) {
    // Find nearest team A player that isn't the ball carrier
    let markTarget = null, markDist = Infinity;
    for (const a of teamA) {
      if (a === possession) continue;
      const d = dist(p, a);
      // Prefer marking players in dangerous positions
      const dangerBonus = (a.x > W / 2) ? 30 : 0;
      if (d - dangerBonus < markDist) { markTarget = a; markDist = d - dangerBonus; }
    }
    if (markTarget) {
      let markScore = 25 + noise();
      if (mood === 'parkbus') markScore += 30;
      if (mood === 'pressing') markScore -= 10;
      if (role === 'def') markScore += 15;
      // Position between mark target and our goal
      const mx = markTarget.x * 0.6 + (W - 50) * 0.4;
      const my = markTarget.y;
      actions.push({ action: 'mark', score: markScore, tx: mx, ty: my });
    }
  }

  // --- HOLD SHAPE: shift with ball position ---
  if (!hasBall) {
    let holdScore = 20 + noise();
    if (mood === 'parkbus') holdScore += 25;
    if (mood === 'counter' && !teamHasBall) holdScore += 20;
    // Shift home position based on ball
    const shiftX = (ball.x / W - 0.5) * (mood === 'parkbus' ? 80 : 140);
    const shiftY = (ball.y / H - 0.5) * 60;
    let hx = p.homeX + shiftX;
    let hy = p.homeY + shiftY;
    // Park the bus: compress toward own goal
    if (mood === 'parkbus') { hx = Math.max(hx, W * 0.55); }
    actions.push({ action: 'hold', score: holdScore, tx: hx, ty: hy });
  }

  // --- MOVE TO SPACE: find open field ---
  if (teamHasBall && !hasBall) {
    let spaceScore = 20 + noise();
    if (mood === 'possession') spaceScore += 30;
    if (mood === 'counter' && teamHasBall) spaceScore += 25;
    // Zone depends on role
    let zx, zy;
    if (role === 'fwd') {
      zx = W * 0.2 + Math.random() * W * 0.25; // attacking third
      zy = H * 0.5;
    } else if (role === 'mid') {
      zx = W * 0.35 + Math.random() * W * 0.2;
      zy = p.homeY;
    } else {
      zx = W * 0.55 + Math.random() * W * 0.15;
      zy = p.homeY;
    }
    const sp = findSpace(p, zx, zy, 200);
    actions.push({ action: 'space', score: spaceScore, tx: sp.x, ty: sp.y });
  }

  // --- MAKE A RUN: sprint toward goal ---
  if (teamHasBall && !hasBall && (role === 'fwd' || role === 'mid')) {
    let runScore = 35 + noise();
    if (mood === 'counter' && teamHasBall) runScore += 35;
    if (mood === 'pressing') runScore += 20;
    if (role === 'fwd') runScore += 25;
    // Bonus if already in attacking half
    if (p.x < W / 2) runScore += 15;
    // Run toward a point near their goal
    const runX = 50 + Math.random() * 150;
    const runY = H * 0.2 + Math.random() * H * 0.6;
    actions.push({ action: 'run', score: runScore, tx: runX, ty: runY });
  }

  // --- CHASE LOOSE BALL ---
  if (!possession) {
    const db = dist(p, ball);
    let chaseScore = 50 + noise();
    if (db < 200) chaseScore += 40;
    if (role === 'fwd' || role === 'mid') chaseScore += 15;
    if (role === 'def' && db > 300) chaseScore -= 30;
    actions.push({ action: 'chase', score: chaseScore, tx: ball.x, ty: ball.y });
  }

  // --- WITH BALL: dribble / pass / shoot ---
  if (hasBall) {
    const opp = nearestOpponent(p.x, p.y);

    // Shoot if in range — high priority, scales with proximity
    if (p.x < 350) {
      const shotY = H / 2 + (Math.random() - 0.5) * GOAL_H * 0.8;
      let shotScore = 70 + noise();
      shotScore += (350 - p.x) / 3; // up to +116 when right at goal
      actions.push({ action: 'shoot', score: shotScore, tx: 10, ty: shotY });
    }

    // Dribble toward goal
    const goalX = Math.max(30, p.x - MOVE_RADIUS * 0.7);
    const goalY = H / 2 + (Math.random() - 0.5) * 100;
    let dribScore = 40 + noise();
    if (mood === 'counter') dribScore += 20;
    if (opp.d < 60) dribScore -= 25; // pressure: prefer passing
    if (opp.d > 120) dribScore += 15; // space ahead: go for it
    if (role === 'fwd') dribScore += 10;
    actions.push({ action: 'dribble', score: dribScore, tx: goalX, ty: goalY });

    // Pass to open teammate
    for (const t of teamB) {
      if (t === p || t.index === 0) continue;
      const td = dist(p, t);
      if (td < 50 || td > 500) continue;
      const open = isOpen(t, 80);
      const laneClear = isPassLaneClear(p, t);
      let passScore = 35 + noise();
      if (mood === 'possession') passScore += 20;
      if (open) passScore += 20;
      if (!laneClear) passScore -= 45; // opponent in the way
      // Forward pass bonus
      const forwardGain = (p.x - t.x) / W;
      if (forwardGain > 0) passScore += forwardGain * 40;
      if (opp.d < 60) passScore += 25; // under pressure: pass!
      if (aiRole(t) === 'fwd') passScore += 10;
      if (t.x < 350) passScore += 15; // pass into shooting range
      actions.push({ action: 'pass', score: passScore, tx: t.x, ty: t.y, passTarget: t });
    }
  }

  return actions;
}

function planAI() {
  aiMood = pickAIMood();

  const MAX_BALL_CHASERS = 2;

  // First pass: score all actions for each player
  const playerActions = [];
  for (const p of teamB) {
    if (p.index === 0 && possession !== p) {
      playerActions.push({ p, best: null, gk: true });
      continue;
    }
    const actions = scoreActions(p, aiMood);
    actions.sort((a, b) => b.score - a.score);
    playerActions.push({ p, actions, best: null, gk: false });
  }

  // Determine who gets to chase/press the ball (max 2, pick closest)
  const ballChasers = playerActions
    .filter(pa => !pa.gk && pa.actions && pa.actions.length > 0 && (pa.actions[0].action === 'chase' || pa.actions[0].action === 'press'))
    .sort((a, b) => dist(a.p, ball) - dist(b.p, ball));

  const allowedChasers = new Set(ballChasers.slice(0, MAX_BALL_CHASERS).map(pa => pa.p));

  // Second pass: assign actions, redirecting excess chasers to mark/hold
  for (const pa of playerActions) {
    const { p } = pa;

    if (pa.gk) {
      const ty = clamp(ball.y, GOAL_Y + 20, GOAL_Y + GOAL_H - 20);
      aiSetTarget(p, p.homeX, ty);
      if (!possession && dist(p, ball) < 120) {
        aiSetTarget(p, ball.x, ball.y);
      }
      continue;
    }

    const { actions } = pa;
    if (!actions || actions.length === 0) continue;

    // Pick best action, but skip chase/press if not in allowed chasers
    let best = null;
    for (const a of actions) {
      if ((a.action === 'chase' || a.action === 'press') && !allowedChasers.has(p)) continue;
      best = a;
      break;
    }
    if (!best) best = actions[actions.length - 1]; // fallback to lowest-scored

    if (best.action === 'shoot') {
      p.plannedPass = { x: best.tx, y: best.ty, isShot: true };
      const goalDir = { x: best.tx - p.x, y: best.ty - p.y };
      const gd = Math.sqrt(goalDir.x ** 2 + goalDir.y ** 2) || 1;
      aiSetTarget(p, p.x + (goalDir.x / gd) * Math.min(MOVE_RADIUS * 0.5, gd), p.y + (goalDir.y / gd) * Math.min(MOVE_RADIUS * 0.5, gd));
    } else if (best.action === 'pass') {
      p.plannedPass = { x: best.tx, y: best.ty };
      p.passFirst = true;
    } else if (best.action === 'press') {
      aiSetTarget(p, best.tx, best.ty);
      if (best.tackle) p.tackleTarget = possession;
    } else {
      aiSetTarget(p, best.tx, best.ty);
    }
  }

  // Make pass receivers hold position near where the pass is aimed
  for (const p of teamB) {
    if (p.plannedPass && !p.plannedPass.isShot) {
      // Find the teammate closest to the pass target
      const pt = p.plannedPass;
      let receiver = null, bestD = Infinity;
      for (const t of teamB) {
        if (t === p || t.index === 0) continue;
        const d = Math.sqrt((t.x - pt.x) ** 2 + (t.y - pt.y) ** 2);
        if (d < bestD) { receiver = t; bestD = d; }
      }
      if (receiver && bestD < 100) {
        // Tell receiver to stay put or move only slightly toward the pass
        aiSetTarget(receiver, pt.x, pt.y);
        receiver._receivingPass = true;
      }
    }
  }

  // Spread out AI targets that are too close together
  const MIN_TARGET_DIST = 60;
  for (let i = 0; i < teamB.length; i++) {
    for (let j = i + 1; j < teamB.length; j++) {
      const a = teamB[i], b = teamB[j];
      // Skip GK and ball carrier
      if (a.index === 0 || b.index === 0) continue;
      if (possession === a || possession === b) continue;
      const dx = b.tx - a.tx, dy = b.ty - a.ty;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < MIN_TARGET_DIST && d > 0.1) {
        const push = (MIN_TARGET_DIST - d) / 2;
        const nx = dx / d, ny = dy / d;
        // Push targets apart, re-clamp to move radius
        a.tx -= nx * push;
        a.ty -= ny * push;
        b.tx += nx * push;
        b.ty += ny * push;
        a.tx = clamp(a.tx, 30, W - 30);
        a.ty = clamp(a.ty, 30, H - 30);
        b.tx = clamp(b.tx, 30, W - 30);
        b.ty = clamp(b.ty, 30, H - 30);
      }
    }
  }

  // Execute AI planned passes/shots immediately for pass-first
  for (const p of teamB) {
    if (p.plannedPass && possession === p) {
      if (p.plannedPass.isShot) {
        // Shots execute after dribble arrives (handled in movePlayer)
      } else if (p.passFirst) {
        const pp = p.plannedPass;
        const passDist = Math.sqrt((pp.x - ball.x) ** 2 + (pp.y - ball.y) ** 2);
        const power = Math.max(6, passDist / 8);
        kickBall(pp.x, pp.y, power);
        p.plannedPass = null;
        p.passFirst = false;
      }
    }
  }
}

// --- Player GK auto-plan ---
function autoplanGK() {
  const gk = teamA[0];
  if (gk.hasOrder) return;
  const ty = clamp(ball.y, GOAL_Y + 20, GOAL_Y + GOAL_H - 20);
  const dx = gk.homeX - gk.x, dy = ty - gk.y;
  const d = Math.sqrt(dx * dx + dy * dy);
  if (d > MOVE_RADIUS) {
    gk.tx = gk.x + (dx / d) * MOVE_RADIUS;
    gk.ty = gk.y + (dy / d) * MOVE_RADIUS;
  } else {
    gk.tx = gk.homeX;
    gk.ty = ty;
  }
}

// --- Simulation (runs during play phase) ---
function movePlayer(p) {
  if (p.tackleTarget) {
    if (possession === p.tackleTarget) {
      // Track the target, but clamp to MOVE_RADIUS from start position
      const tx = p.tackleTarget.x, ty = p.tackleTarget.y;
      const dx = tx - p._startX, dy = ty - p._startY;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d <= MOVE_RADIUS) {
        p.tx = tx;
        p.ty = ty;
      } else {
        p.tx = p._startX + (dx / d) * MOVE_RADIUS;
        p.ty = p._startY + (dy / d) * MOVE_RADIUS;
      }
    } else {
      p.tackleTarget = null;
    }
  }

  const dx = p.tx - p.x, dy = p.ty - p.y;
  const d = Math.sqrt(dx * dx + dy * dy);
  p._moving = false;
  p._kicking = false;
  if (d > 2) {
    let spd = p.speed * GAME_SPEED;
    if (possession === p) spd *= DRIBBLE_SPEED_PENALTY;
    p.x += (dx / d) * spd;
    p.y += (dy / d) * spd;
    p._moving = true;
  } else if (possession === p && p.plannedPass) {
    // Arrived at dribble target — execute planned pass
    p._kicking = true;
    const pp = p.plannedPass;
    const passDist = Math.sqrt((pp.x - p.x) ** 2 + (pp.y - p.y) ** 2);
    const power = Math.max(6, passDist / 8);
    kickBall(pp.x, pp.y, power);
    p.plannedPass = null;
  }
  p.x = clamp(p.x, p.radius, W - p.radius);
  p.y = clamp(p.y, p.radius, H - p.radius);

  if (possession === p) {
    if (d > 2) {
      ball.x = p.x + (dx / d) * (p.radius - 3);
      ball.y = p.y + (dy / d) * (p.radius - 3);
    } else {
      ball.x = p.x + p.radius - 3;
      ball.y = p.y;
    }
    ball.vx = 0;
    ball.vy = 0;
  }
}

function separatePlayers(allPlayers) {
  const minDist = 28; // slightly less than 2 * radius (14+14)
  for (let i = 0; i < allPlayers.length; i++) {
    for (let j = i + 1; j < allPlayers.length; j++) {
      const a = allPlayers[i], b = allPlayers[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < minDist) {
        let nx, ny;
        if (d > 0.1) {
          nx = dx / d;
          ny = dy / d;
        } else {
          // Deterministic nudge based on index — no random wobble
          const angle = ((i * 7 + j * 13) % 12) * (Math.PI * 2 / 12);
          nx = Math.cos(angle);
          ny = Math.sin(angle);
        }
        const overlap = (minDist - d) / 2 + 0.5;
        // Only push a player if it's still moving (not arrived at target)
        const aMoving = Math.sqrt((a.tx - a.x) ** 2 + (a.ty - a.y) ** 2) > 3;
        const bMoving = Math.sqrt((b.tx - b.x) ** 2 + (b.ty - b.y) ** 2) > 3;
        if (aMoving || bMoving) {
          // Push the moving one(s) more
          if (aMoving) { a.x -= nx * overlap; a.y -= ny * overlap; }
          if (bMoving) { b.x += nx * overlap; b.y += ny * overlap; }
        } else {
          // Both stopped — gentle one-time push, lower index gets priority to stay
          b.x += nx * overlap * 2;
          b.y += ny * overlap * 2;
        }
      }
    }
  }
}

function handlePossession(allPlayers) {
  tackleCooldown = Math.max(0, tackleCooldown - 1);
  lastKickerCooldown = Math.max(0, lastKickerCooldown - 1);
  if (lastKickerCooldown <= 0) lastKicker = null;

  if (!possession && passTarget) {
    const d = dist(passTarget, ball);
    if (d < PICKUP_RANGE * 2) {
      possession = passTarget;
      ball.vx = 0; ball.vy = 0;
      passTarget = null;
      return;
    }
    if (Math.abs(ball.vx) < 0.1 && Math.abs(ball.vy) < 0.1) {
      passTarget = null;
    }
  }

  for (const p of allPlayers) {
    const d = dist(p, ball);

    if (!possession && d < PICKUP_RANGE && tackleCooldown <= 0 && p !== lastKicker) {
      possession = p;
      passTarget = null;
      ball.vx = 0; ball.vy = 0;
      return;
    }

    if (possession && possession !== p && possession.side !== p.side && p.tackleCooldown <= 0) {
      const dp = dist(p, possession);
      const isDirectedTackle = p.tackleTarget === possession;
      const range = isDirectedTackle ? TACKLE_RANGE * 1.5 : TACKLE_RANGE;
      if (dp < range && (isDirectedTackle || tackleCooldown <= 0)) {
        const successRate = isDirectedTackle ? 0.95 : TACKLE_SUCCESS;
        p.tackleCooldown = 15;
        if (Math.random() < successRate) {
          const victim = possession;
          possession = p;
          tackleCooldown = 15;
          p.tackleTarget = null;
          victim.tackleCooldown = 120;
        } else {
          const dx2 = p.x - possession.x, dy2 = p.y - possession.y;
          const dd = Math.sqrt(dx2 * dx2 + dy2 * dy2) || 1;
          p.x += (dx2 / dd) * 8;
          p.y += (dy2 / dd) * 8;
          p.tackleCooldown = 30;
          p.tackleTarget = null;
        }
      }
    }
  }
}

function updateBall() {
  if (possession || goalScored) return;
  ball.x += ball.vx * GAME_SPEED;
  ball.y += ball.vy * GAME_SPEED;
  ball.vx *= ball.friction;
  ball.vy *= ball.friction;
  if (Math.abs(ball.vx) < 0.05 && Math.abs(ball.vy) < 0.05) { ball.vx = 0; ball.vy = 0; }

  if (ball.y < ball.radius) { ball.y = ball.radius; ball.vy *= -0.7; }
  if (ball.y > H - ball.radius) { ball.y = H - ball.radius; ball.vy *= -0.7; }

  if (ball.x <= ball.radius + GOAL_W && ball.y > GOAL_Y && ball.y < GOAL_Y + GOAL_H) {
    score[1]++; goalFlash = 60; goalScored = true;
    document.getElementById('score').textContent = `${score[0]} : ${score[1]}`;
    ball.vx = 0; ball.vy = 0;
    setTimeout(() => resetAfterGoal(0), 1200); // team B scored, team A (0) kicks off
    return;
  }
  if (ball.x >= W - ball.radius - GOAL_W && ball.y > GOAL_Y && ball.y < GOAL_Y + GOAL_H) {
    score[0]++; goalFlash = 60; goalScored = true;
    document.getElementById('score').textContent = `${score[0]} : ${score[1]}`;
    ball.vx = 0; ball.vy = 0;
    setTimeout(() => resetAfterGoal(1), 1200); // team A scored, team B (1) kicks off
    return;
  }

  if (ball.x < ball.radius) { ball.x = ball.radius; ball.vx *= -0.7; }
  if (ball.x > W - ball.radius) { ball.x = W - ball.radius; ball.vx *= -0.7; }
}

function checkGoalInPossession() {
  if (!possession || goalScored) return;
  if (ball.x <= GOAL_W + ball.radius && ball.y > GOAL_Y && ball.y < GOAL_Y + GOAL_H) {
    score[1]++; goalFlash = 60; goalScored = true;
    document.getElementById('score').textContent = `${score[0]} : ${score[1]}`;
    possession = null;
    setTimeout(() => resetAfterGoal(0), 1200); // team B scored, team A (0) kicks off
  }
  if (ball.x >= W - GOAL_W - ball.radius && ball.y > GOAL_Y && ball.y < GOAL_Y + GOAL_H) {
    score[0]++; goalFlash = 60; goalScored = true;
    document.getElementById('score').textContent = `${score[0]} : ${score[1]}`;
    possession = null;
    setTimeout(() => resetAfterGoal(1), 1200); // team A scored, team B (1) kicks off
  }
}

// --- Drawing ---
function drawField() {
  ctx.fillStyle = '#2d8a4e';
  ctx.fillRect(0, 0, W, H);
  for (let i = 0; i < W; i += 60) {
    ctx.fillStyle = i % 120 === 0 ? '#2d8a4e' : '#278a46';
    ctx.fillRect(i, 0, 60, H);
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(W / 2, 0); ctx.lineTo(W / 2, H); ctx.stroke();
  ctx.beginPath(); ctx.arc(W / 2, H / 2, 80, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.arc(W / 2, H / 2, 4, 0, Math.PI * 2); ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.fill();
  const paW = 150, paH = 350, paY = (H - paH) / 2;
  ctx.strokeRect(0, paY, paW, paH); ctx.strokeRect(W - paW, paY, paW, paH);
  const gaW = 50, gaH = 200, gaY = (H - gaH) / 2;
  ctx.strokeRect(0, gaY, gaW, gaH); ctx.strokeRect(W - gaW, gaY, gaW, gaH);
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(0, GOAL_Y, GOAL_W, GOAL_H); ctx.fillRect(W - GOAL_W, GOAL_Y, GOAL_W, GOAL_H);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, GOAL_Y - 3, GOAL_W, 6); ctx.fillRect(0, GOAL_Y + GOAL_H - 3, GOAL_W, 6);
  ctx.fillRect(W - GOAL_W, GOAL_Y - 3, GOAL_W, 6); ctx.fillRect(W - GOAL_W, GOAL_Y + GOAL_H - 3, GOAL_W, 6);
}

function drawPlayer(p, color) {
  const hasBall = possession === p;
  const palette = TEAM_PALETTES[p.side];

  // During plan phase, show move radius for selected player
  if (phase === 'plan' && p === selected && p.side === 0) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, MOVE_RADIUS, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,235,59,0.07)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,235,59,0.25)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Selection ring
  if (p === selected) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius + 5, 0, Math.PI * 2);
    ctx.strokeStyle = '#ffeb3b';
    ctx.lineWidth = 3;
    ctx.stroke();
  }

  // Show planned move target (during plan phase for team A)
  if (phase === 'plan' && p.side === 0 && p.hasOrder) {
    const dx = p.tx - p.x, dy = p.ty - p.y;
    if (Math.sqrt(dx * dx + dy * dy) > 5) {
      ctx.beginPath();
      ctx.arc(p.tx, p.ty, 6, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,235,59,0.6)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.tx, p.ty);
      ctx.strokeStyle = 'rgba(255,235,59,0.4)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.setLineDash([]);
    }
    if (p.tackleTarget) {
      ctx.fillStyle = 'rgba(255,100,100,0.9)';
      ctx.font = 'bold 12px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('T', p.x, p.y - p.radius - 12);
    }
  }

  // Show planned pass/kick
  if (phase === 'plan' && p.side === 0 && p.plannedPass) {
    const {x: tx, y: ty} = p.plannedPass;
    const hasDribble = p.hasOrder && (Math.abs(p.tx - p.x) > 5 || Math.abs(p.ty - p.y) > 5);
    const sx = (hasDribble && !p.passFirst) ? p.tx : p.x;
    const sy = (hasDribble && !p.passFirst) ? p.ty : p.y;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(tx, ty);
    ctx.strokeStyle = 'rgba(100,200,255,0.6)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.arc(tx, ty, 5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(100,200,255,0.6)';
    ctx.fill();
  }

  // Possession glow
  if (hasBall) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius + 8, 0, Math.PI * 2);
    ctx.strokeStyle = p.side === 0 ? 'rgba(33,150,243,0.5)' : 'rgba(244,67,54,0.5)';
    ctx.lineWidth = 3;
    ctx.stroke();
  }

  // "Has order" indicator
  if (phase === 'plan' && p.side === 0 && p.hasOrder) {
    ctx.beginPath();
    ctx.arc(p.x + p.radius + 3, p.y - p.radius - 6, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#4CAF50';
    ctx.fill();
  }

  // Shadow
  ctx.beginPath();
  ctx.ellipse(p.x, p.y + 2, 10, 4, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fill();

  // Draw pixel sprite
  drawPixelPlayer(p, palette);

  // Jersey number tooltip on hover or select
  if (p === hoveredPlayer || p === selected) {
    const label = '' + (p.index + 1);
    ctx.font = 'bold 10px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    const tw = ctx.measureText(label).width;
    const px = p.x, py = p.y - 20;
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.beginPath();
    ctx.roundRect(px - tw/2 - 4, py - 12, tw + 8, 14, 3);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillText(label, px, py);
  }
}

function drawBall() {
  ctx.beginPath();
  ctx.ellipse(ball.x + 2, ball.y + 3, ball.radius + 1, ball.radius * 0.5, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius * 0.45, 0, Math.PI * 2);
  ctx.fillStyle = '#333';
  ctx.fill();
}

function drawDragLine() {
  if (!dragging || !dragMouse || !dragActive) return;
  const isPass = dragButton === 2;
  const color = isPass ? 'rgba(100,200,255,0.8)' : 'rgba(255,235,59,0.6)';

  // Start point: for pass, use dragStartPos (could be dribble target); for move, use player pos
  const startX = isPass ? dragStartPos.x : dragging.x;
  const startY = isPass ? dragStartPos.y : dragging.y;

  // For move, clamp visual to radius
  let tx = dragMouse.x, ty = dragMouse.y;
  if (!isPass) {
    const dx = dragMouse.x - dragging.x, dy = dragMouse.y - dragging.y;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d > MOVE_RADIUS) {
      tx = dragging.x + (dx / d) * MOVE_RADIUS;
      ty = dragging.y + (dy / d) * MOVE_RADIUS;
    }
  }

  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(startX, startY);
  ctx.lineTo(tx, ty);
  ctx.strokeStyle = color;
  ctx.lineWidth = 2.5;
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.arc(tx, ty, 5, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
}

function drawGoalFlash() {
  if (goalFlash <= 0) return;
  ctx.fillStyle = `rgba(255, 255, 100, ${goalFlash / 120})`;
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 72px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('GOAL!', W / 2, H / 2);
  goalFlash--;
}

// --- End of round ---
function endRound() {
  phase = 'plan';
  round++;
  playBtn.disabled = false;
  timerBar.style.display = 'none';
  selected = null;

  // Reset orders for next round
  for (const p of teamA) {
    p.hasOrder = false;
    p.tx = p.x;
    p.ty = p.y;
    p.tackleTarget = null;
    p.plannedPass = null;
    p.passFirst = false;
  }
  for (const p of teamB) {
    p.tx = p.x;
    p.ty = p.y;
    p.tackleTarget = null;
    p.plannedPass = null;
  }

  updateRoundInfo();
}

// --- Game loop ---
function update() {
  if (phase === 'play') {
    playTimer--;
    timerFill.style.width = ((PLAY_DURATION - playTimer) / PLAY_DURATION * 100) + '%';

    const allPlayers = [...teamA, ...teamB];
    // Snapshot positions before movement for animation detection
    for (const p of allPlayers) {
      p._prevX = p.x;
      p._prevY = p.y;
    }
    for (const p of allPlayers) {
      p.tackleCooldown = Math.max(0, p.tackleCooldown - 1);
      movePlayer(p);
    }
    separatePlayers(allPlayers);
    handlePossession(allPlayers);
    updateBall();
    checkGoalInPossession();

    // Check if all actions are complete
    const allDone = allPlayers.every(p => {
      const dx = p.tx - p.x, dy = p.ty - p.y;
      const arrived = Math.sqrt(dx * dx + dy * dy) <= 3;
      const noPendingPass = !p.plannedPass;
      return arrived && noPendingPass;
    });
    const ballStopped = possession || (Math.abs(ball.vx) < 0.2 && Math.abs(ball.vy) < 0.2);

    if ((allDone && ballStopped) || playTimer <= 0) {
      endRound();
    }
  }

  // Auto-plan GK during plan phase
  if (phase === 'plan') {
    autoplanGK();
  }
}

function draw() {
  // Advance animation
  animTick++;
  if (animTick >= ANIM_TICK_RATE) {
    animTick = 0;
    animFrame++;
  }

  drawField();
  if (!possession) drawBall();

  // Sort all players by Y so lower ones draw on top
  const allSorted = [...teamA.map(p => ({p, color: '#2196F3'})), ...teamB.map(p => ({p, color: '#f44336'}))];
  allSorted.sort((a, b) => a.p.y - b.p.y);
  for (const {p, color} of allSorted) {
    drawPlayer(p, color);
    if (possession === p) drawBall();
  }

  drawDragLine();
  drawGoalFlash();

  // Phase overlay during play
  if (phase === 'play') {
    ctx.fillStyle = 'rgba(0,0,0,0.03)';
    ctx.fillRect(0, 0, W, H);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

updateRoundInfo();

// Stadium ambience
const ambience = new Audio('stadium-sound.mp3');
ambience.loop = true;
ambience.volume = 0.3;
canvas.addEventListener('click', () => { if (ambience.paused) ambience.play(); }, { once: true });

loop();
</script>
