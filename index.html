<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fussball Commander - Turn Based</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; flex-direction: column; gap: 10px; }
  canvas { border: 2px solid #fff; cursor: crosshair; }
  #score {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    color: #fff; font: bold 28px monospace; text-shadow: 0 0 10px rgba(0,0,0,.8);
    z-index: 10; pointer-events: none;
  }
  #round-info {
    position: fixed; top: 55px; left: 50%; transform: translateX(-50%);
    color: #ccc; font: 16px monospace; z-index: 10; pointer-events: none;
  }
  #info-btn {
    position: fixed; top: 15px; left: 20px;
    z-index: 11; background: rgba(255,255,255,0.15); color: #ccc; border: 1px solid #555;
    font: 12px monospace; padding: 4px 10px; border-radius: 4px; cursor: pointer;
  }
  #info-btn:hover { background: rgba(255,255,255,0.25); }
  #info {
    position: fixed; top: 42px; left: 20px;
    color: #ccc; font: 12px monospace; z-index: 10; pointer-events: none;
    text-align: left; line-height: 1.7; display: none;
    background: rgba(20, 20, 40, 0.95); padding: 10px 14px; border-radius: 6px; border: 1px solid #444;
  }
  #play-btn {
    position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
    z-index: 10; background: #4CAF50; color: #fff; border: none;
    font: bold 20px monospace; padding: 12px 40px; border-radius: 8px;
    cursor: pointer; transition: all 0.2s;
  }
  #play-btn:hover { background: #66BB6A; transform: translateX(-50%) scale(1.05); }
  #play-btn:disabled { background: #555; cursor: not-allowed; transform: translateX(-50%); }
  #timer-bar {
    position: fixed; top: 85px; left: 50%; transform: translateX(-50%);
    width: 300px; height: 8px; background: #333; border-radius: 4px;
    z-index: 10; overflow: hidden; display: none;
  }
  #timer-fill {
    height: 100%; background: #4CAF50; border-radius: 4px; transition: width 0.05s linear;
  }
</style>
</head>
<body>
<div id="score">0 : 0</div>
<div id="round-info">Round 1 — Plan your moves</div>
<div id="timer-bar"><div id="timer-fill"></div></div>
<canvas id="c"></canvas>
<button id="play-btn">▶ PLAY</button>
<button id="info-btn" onclick="document.getElementById('info').style.display = document.getElementById('info').style.display === 'none' ? 'block' : 'none'">Instructions</button>
<div id="info">
  &bull; Left-drag any player to move them<br>
  &bull; Right-drag from ball carrier to pass or shoot<br>
  &bull; Left-drag to dribble, then right-drag from destination to pass<br>
  &bull; Right-drag to pass first, then left-drag to run<br>
  &bull; Press Space or click Play to execute
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const playBtn = document.getElementById('play-btn');
const roundInfoEl = document.getElementById('round-info');
const timerBar = document.getElementById('timer-bar');
const timerFill = document.getElementById('timer-fill');

const W = 1200, H = 750;
canvas.width = W; canvas.height = H;

const ballSpeedMult = 0.2;

const GOAL_W = 12;
const GOAL_H = 160;
const GOAL_Y = (H - GOAL_H) / 2;

// --- Game state ---
let score = [0, 0];
let selected = null;
let possession = null;
let passTarget = null;
let tackleCooldown = 0;
let goalFlash = 0;
let goalScored = false;
let round = 1;
let phase = 'plan'; // 'plan' or 'play'
let playTimer = 0;
const PLAY_DURATION = 120; // 2s at 60fps
const MOVE_RADIUS = 120; // max distance a player can move per round
const GAME_SPEED = 1.0; // simulation speed during play phase

const TACKLE_RANGE = 30;
const TACKLE_SUCCESS = 0.45;
const PICKUP_RANGE = 20;
const DRIBBLE_SPEED_PENALTY = 0.7;

// --- Formation (4-4-2) relative positions [0-1], all in own half (x < 0.5) ---
const formationBase = [
  [0.08, 0.5],   // GK
  [0.2, 0.15], [0.2, 0.38], [0.2, 0.62], [0.2, 0.85], // DEF
  [0.38, 0.12], [0.38, 0.38], [0.38, 0.62], [0.38, 0.88], // MID — wider spread
  [0.45, 0.28], [0.45, 0.72], // FWD — wider apart
];

let kickoffSide = 0; // 0 = team A kicks off, 1 = team B

function createTeam(side) {
  const isKickoff = side === kickoffSide;

  return formationBase.map((pos, i) => {
    let x = side === 0 ? pos[0] * W : W - pos[0] * W;
    let y = pos[1] * H;

    // Kickoff team: FWD 9 right next to ball, FWD 10 halfway to circle edge
    if (isKickoff && i === 9) {
      x = W / 2 + (side === 0 ? -2 : 2);
      y = H / 2 - 18;
    } else if (isKickoff && i === 10) {
      x = W / 2 + (side === 0 ? -2 : 2);
      y = H / 2 + 40;
    }

    // Non-kickoff team: ensure all players are outside the center circle
    if (!isKickoff) {
      const dx = x - W / 2, dy = y - H / 2;
      const d = Math.sqrt(dx * dx + dy * dy);
      const minDist = 220; // far outside center circle
      if (d < minDist) {
        // Push toward own half
        const pushX = side === 0 ? -1 : 1;
        x = W / 2 + pushX * minDist;
      }
    }

    return {
      x, y, tx: x, ty: y,
      homeX: x, homeY: y,
      speed: i === 0 ? 2.5 : 3.0 + Math.random() * 0.5,
      radius: 14,
      side,
      index: i,
      tackleCooldown: 0,
      tackleTarget: null,
      hasOrder: false,
      plannedPass: null,
      passFirst: false,
    };
  });
}

let teamA = createTeam(0);
let teamB = createTeam(1);

const ball = {
  x: W / 2, y: H / 2,
  vx: 0, vy: 0,
  radius: 8,
  friction: 0.98,
};

// Give kickoff possession to FWD 9 of the kickoff team
function setKickoffPossession() {
  const team = kickoffSide === 0 ? teamA : teamB;
  possession = team[9];
  ball.x = possession.x + possession.radius - 3;
  ball.y = possession.y;
  ball.vx = 0; ball.vy = 0;
}
setKickoffPossession();

function resetAfterGoal() {
  // Alternate kickoff
  kickoffSide = 1 - kickoffSide;
  ball.x = W / 2; ball.y = H / 2;
  ball.vx = 0; ball.vy = 0;
  possession = null;
  passTarget = null;
  tackleCooldown = 0;
  goalScored = false;
  lastKicker = null;
  lastKickerCooldown = 0;
  teamA = createTeam(0);
  teamB = createTeam(1);
  setKickoffPossession();
  selected = null;
  phase = 'plan';
  playBtn.disabled = false;
  updateRoundInfo();
}

let lastKicker = null;
let lastKickerCooldown = 0;

function kickBall(targetX, targetY, power) {
  const dx = targetX - ball.x, dy = targetY - ball.y;
  const dd = Math.sqrt(dx * dx + dy * dy);
  if (dd < 1) return;
  ball.vx = (dx / dd) * power * ballSpeedMult;
  ball.vy = (dy / dd) * power * ballSpeedMult;
  ball.x += (dx / dd) * 20;
  ball.y += (dy / dd) * 20;
  lastKicker = possession;
  lastKickerCooldown = 40;
  possession = null;
}

function dist(a, b) {
  const dx = a.x - b.x, dy = a.y - b.y;
  return Math.sqrt(dx * dx + dy * dy);
}

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function updateRoundInfo() {
  if (phase === 'plan') {
    roundInfoEl.textContent = `Round ${round} — Plan your moves`;
  } else {
    roundInfoEl.textContent = `Round ${round} — Playing...`;
  }
}

// --- Input (only during plan phase) ---
let dragging = null; // player being dragged from (for pass)
let dragMouse = null; // current mouse pos during drag
let suppressClick = false; // prevent click after a drag

function getMousePos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (W / rect.width),
    y: (e.clientY - rect.top) * (H / rect.height),
  };
}

function playerAt(mx, my, team) {
  for (const p of team) {
    const dx = p.x - mx, dy = p.y - my;
    if (Math.sqrt(dx * dx + dy * dy) < p.radius + 6) return p;
  }
  return null;
}

let dragStartPos = null;
const DRAG_THRESHOLD = 10;
let dragActive = false;
let dragButton = -1; // 0 = left, 2 = right

canvas.addEventListener('mousedown', (e) => {
  if (phase !== 'plan') return;
  if (e.button !== 0 && e.button !== 2) return;
  const {x: mx, y: my} = getMousePos(e);

  // Right-drag from dribble destination = pass after dribble
  if (e.button === 2) {
    // Find ball carrier who has a dribble order — check if click is near their move target
    const carrier = teamA.find(p => possession === p);
    if (carrier && carrier.hasOrder && !carrier.plannedPass) {
      const dx = carrier.tx - mx, dy = carrier.ty - my;
      if (Math.sqrt(dx * dx + dy * dy) < 20) {
        dragging = carrier;
        dragStartPos = {x: carrier.tx, y: carrier.ty};
        dragMouse = {x: mx, y: my};
        dragActive = false;
        dragButton = 2;
        return;
      }
    }
    // Also allow right-drag directly from ball carrier
    if (carrier) {
      const dx = carrier.x - mx, dy = carrier.y - my;
      if (Math.sqrt(dx * dx + dy * dy) < carrier.radius + 6) {
        dragging = carrier;
        dragStartPos = {x: mx, y: my};
        dragMouse = {x: mx, y: my};
        dragActive = false;
        dragButton = 2;
        selected = carrier;
        return;
      }
    }
    return;
  }

  // Left-drag from any team A player
  const clickedA = playerAt(mx, my, teamA);
  if (clickedA) {
    dragging = clickedA;
    dragStartPos = {x: mx, y: my};
    dragMouse = {x: mx, y: my};
    dragActive = false;
    dragButton = 0;
    selected = clickedA;
  }
});

canvas.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  dragMouse = getMousePos(e);
  if (!dragActive && dragStartPos) {
    const dx = dragMouse.x - dragStartPos.x, dy = dragMouse.y - dragStartPos.y;
    if (Math.sqrt(dx * dx + dy * dy) > DRAG_THRESHOLD) {
      dragActive = true;
    }
  }
});

canvas.addEventListener('mouseup', (e) => {
  if (dragging && dragActive) {
    const {x: mx, y: my} = getMousePos(e);

    if (dragButton === 2 && possession === dragging) {
      // Right drag from ball carrier = pass/kick
      dragging.plannedPass = { x: mx, y: my };
      // If no dribble order yet, this is a "pass first" — mark it
      const hasDribble = dragging.hasOrder && (Math.abs(dragging.tx - dragging.x) > 5 || Math.abs(dragging.ty - dragging.y) > 5);
      if (!hasDribble) {
        dragging.passFirst = true;
      }
    } else if (dragButton === 0) {
      // Left drag = move order (works for all players including ball carrier = dribble)
      const dx = mx - dragging.x, dy = my - dragging.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d <= MOVE_RADIUS) {
        dragging.tx = mx;
        dragging.ty = my;
      } else {
        dragging.tx = dragging.x + (dx / d) * MOVE_RADIUS;
        dragging.ty = dragging.y + (dy / d) * MOVE_RADIUS;
      }
    }
    dragging.hasOrder = true;
    dragging = null;
    dragMouse = null;
    dragActive = false;
    dragStartPos = null;
    dragButton = -1;
    suppressClick = true;
    return;
  }
  dragging = null;
  dragMouse = null;
  dragActive = false;
  dragStartPos = null;
  dragButton = -1;
});

canvas.addEventListener('click', (e) => {
  if (suppressClick) { suppressClick = false; return; }
  if (phase !== 'plan') return;
  const {x: mx, y: my} = getMousePos(e);

  // Try selecting a player from team A
  const clickedTeammate = playerAt(mx, my, teamA);

  if (clickedTeammate) {
    selected = clickedTeammate;
    return;
  }

  // Check for clicking enemy with ball → tackle order
  if (selected) {
    const targetEnemy = playerAt(mx, my, teamB);

    if (targetEnemy && possession === targetEnemy) {
      selected.tackleTarget = targetEnemy;
      selected.tx = targetEnemy.x;
      selected.ty = targetEnemy.y;
      selected.hasOrder = true;
      return;
    }

    // Move order — clamp to radius
    const dx = mx - selected.x, dy = my - selected.y;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d <= MOVE_RADIUS) {
      selected.tx = mx;
      selected.ty = my;
    } else {
      selected.tx = selected.x + (dx / d) * MOVE_RADIUS;
      selected.ty = selected.y + (dy / d) * MOVE_RADIUS;
    }
    selected.hasOrder = true;
  }
});

// Right-click to plan a shot/kick
canvas.addEventListener('contextmenu', (e) => e.preventDefault());

// --- Play button ---
playBtn.addEventListener('click', () => {
  if (phase !== 'plan') return;
  phase = 'play';
  playTimer = PLAY_DURATION;
  playBtn.disabled = true;
  timerBar.style.display = 'block';

  // Execute planned passes
  for (const p of teamA) {
    if (p.plannedPass && possession === p) {
      if (p.passFirst) {
        // Pass first, then run — kick immediately, keep move target
        const pp = p.plannedPass;
        const passDist = Math.sqrt((pp.x - ball.x) ** 2 + (pp.y - ball.y) ** 2);
        const power = Math.max(6, passDist / 8);
        kickBall(pp.x, pp.y, power);
        p.plannedPass = null;
        p.passFirst = false;
      } else {
        const hasDribble = (Math.abs(p.tx - p.x) > 5 || Math.abs(p.ty - p.y) > 5);
        if (!hasDribble) {
          // No dribble — pass immediately
          const pp = p.plannedPass;
          const passDist = Math.sqrt((pp.x - ball.x) ** 2 + (pp.y - ball.y) ** 2);
          const power = Math.max(6, passDist / 8);
          kickBall(pp.x, pp.y, power);
          p.plannedPass = null;
        }
        // else: keep plannedPass, will execute when player arrives at dribble target
      }
    }
  }

  // AI plans its moves
  planAI();

  updateRoundInfo();
});

// Spacebar also triggers play
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && phase === 'plan') {
    e.preventDefault();
    playBtn.click();
  }
});

// --- AI planning ---
function planAI() {
  const closestToBall = teamB.reduce((best, p) => {
    const d = dist(p, ball);
    return d < best.d ? { p, d } : best;
  }, { p: null, d: Infinity });

  for (const p of teamB) {
    let targetX, targetY;

    if (possession && possession.side === 1 && possession === p) {
      // Has ball — dribble toward goal
      const goalX = 20;
      const goalY = H / 2 + (Math.random() - 0.5) * 80;
      const dx = goalX - p.x, dy = goalY - p.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      targetX = p.x + (dx / d) * Math.min(MOVE_RADIUS, d);
      targetY = p.y + (dy / d) * Math.min(MOVE_RADIUS, d);

      // If close to goal, plan a shot
      if (p.x < 200) {
        p.plannedPass = { x: 10, y: H / 2 + (Math.random() - 0.5) * GOAL_H * 0.7, isShot: true };
      }
    } else if (possession && possession.side === 0) {
      // Team A has ball — chase carrier
      if (p === closestToBall.p || (p.index >= 1 && p.index <= 4 && dist(p, possession) < 350)) {
        const dx = possession.x - p.x, dy = possession.y - p.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        targetX = p.x + (dx / d) * Math.min(MOVE_RADIUS, d);
        targetY = p.y + (dy / d) * Math.min(MOVE_RADIUS, d);
        p.tackleTarget = possession;
      } else if (p.index === 0) {
        targetX = p.homeX;
        targetY = clamp(ball.y, GOAL_Y + 20, GOAL_Y + GOAL_H - 20);
      } else {
        const bx = (ball.x / W - 0.5) * 120;
        const by = (ball.y / H - 0.5) * 60;
        targetX = p.homeX + bx;
        targetY = p.homeY + by;
      }
    } else if (!possession) {
      // Loose ball
      if (p === closestToBall.p || (p.index >= 9 && dist(p, ball) < 300)) {
        const dx = ball.x - p.x, dy = ball.y - p.y;
        const d = Math.sqrt(dx * dx + dy * dy) || 1;
        targetX = p.x + (dx / d) * Math.min(MOVE_RADIUS, d);
        targetY = p.y + (dy / d) * Math.min(MOVE_RADIUS, d);
      } else if (p.index === 0) {
        targetX = p.homeX;
        targetY = clamp(ball.y, GOAL_Y + 20, GOAL_Y + GOAL_H - 20);
      } else {
        const bx = (ball.x / W - 0.5) * 120;
        const by = (ball.y / H - 0.5) * 60;
        targetX = p.homeX + bx;
        targetY = p.homeY + by;
      }
    } else {
      // Teammate has ball
      if (p.index === 0) {
        targetX = p.homeX;
        targetY = clamp(ball.y, GOAL_Y + 20, GOAL_Y + GOAL_H - 20);
      } else {
        const bx = (ball.x / W - 0.5) * 150;
        const by = (ball.y / H - 0.5) * 60;
        targetX = p.homeX + bx - 50;
        targetY = p.homeY + by;
      }
    }

    if (targetX !== undefined) {
      const dx = targetX - p.x, dy = targetY - p.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d > MOVE_RADIUS) {
        p.tx = p.x + (dx / d) * MOVE_RADIUS;
        p.ty = p.y + (dy / d) * MOVE_RADIUS;
      } else {
        p.tx = targetX;
        p.ty = targetY;
      }
    }
  }

  // Execute AI planned passes/shots
  for (const p of teamB) {
    if (p.plannedPass && possession === p) {
      if (p.plannedPass.isShot) {
        kickBall(p.plannedPass.x, p.plannedPass.y, 5 + Math.random() * 2);
      }
      p.plannedPass = null;
    }
  }
}

// --- Player GK auto-plan ---
function autoplanGK() {
  const gk = teamA[0];
  if (gk.hasOrder) return;
  const ty = clamp(ball.y, GOAL_Y + 20, GOAL_Y + GOAL_H - 20);
  const dx = gk.homeX - gk.x, dy = ty - gk.y;
  const d = Math.sqrt(dx * dx + dy * dy);
  if (d > MOVE_RADIUS) {
    gk.tx = gk.x + (dx / d) * MOVE_RADIUS;
    gk.ty = gk.y + (dy / d) * MOVE_RADIUS;
  } else {
    gk.tx = gk.homeX;
    gk.ty = ty;
  }
}

// --- Simulation (runs during play phase) ---
function movePlayer(p) {
  if (p.tackleTarget) {
    if (possession === p.tackleTarget) {
      // Track the target, but stay within original move radius
      const dx = p.tackleTarget.x - p.x, dy = p.tackleTarget.y - p.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d > 2) {
        p.tx = p.tackleTarget.x;
        p.ty = p.tackleTarget.y;
      }
    } else {
      p.tackleTarget = null;
    }
  }

  const dx = p.tx - p.x, dy = p.ty - p.y;
  const d = Math.sqrt(dx * dx + dy * dy);
  if (d > 2) {
    let spd = p.speed * GAME_SPEED;
    if (possession === p) spd *= DRIBBLE_SPEED_PENALTY;
    p.x += (dx / d) * spd;
    p.y += (dy / d) * spd;
  } else if (possession === p && p.plannedPass) {
    // Arrived at dribble target — execute planned pass
    const pp = p.plannedPass;
    const passDist = Math.sqrt((pp.x - p.x) ** 2 + (pp.y - p.y) ** 2);
    const power = Math.max(6, passDist / 8);
    kickBall(pp.x, pp.y, power);
    p.plannedPass = null;
  }
  p.x = clamp(p.x, p.radius, W - p.radius);
  p.y = clamp(p.y, p.radius, H - p.radius);

  if (possession === p) {
    if (d > 2) {
      ball.x = p.x + (dx / d) * (p.radius - 3);
      ball.y = p.y + (dy / d) * (p.radius - 3);
    } else {
      ball.x = p.x + p.radius - 3;
      ball.y = p.y;
    }
    ball.vx = 0;
    ball.vy = 0;
  }
}

function separatePlayers(allPlayers) {
  const minDist = 28; // slightly less than 2 * radius (14+14)
  for (let i = 0; i < allPlayers.length; i++) {
    for (let j = i + 1; j < allPlayers.length; j++) {
      const a = allPlayers[i], b = allPlayers[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < minDist && d > 0.1) {
        const overlap = (minDist - d) / 2;
        const nx = dx / d, ny = dy / d;
        a.x -= nx * overlap;
        a.y -= ny * overlap;
        b.x += nx * overlap;
        b.y += ny * overlap;
      } else if (d <= 0.1) {
        // Nearly identical position — nudge randomly
        a.x += (Math.random() - 0.5) * 4;
        a.y += (Math.random() - 0.5) * 4;
      }
    }
  }
}

function handlePossession(allPlayers) {
  tackleCooldown = Math.max(0, tackleCooldown - 1);
  lastKickerCooldown = Math.max(0, lastKickerCooldown - 1);
  if (lastKickerCooldown <= 0) lastKicker = null;

  if (!possession && passTarget) {
    const d = dist(passTarget, ball);
    if (d < PICKUP_RANGE * 2) {
      possession = passTarget;
      ball.vx = 0; ball.vy = 0;
      passTarget = null;
      return;
    }
    if (Math.abs(ball.vx) < 0.1 && Math.abs(ball.vy) < 0.1) {
      passTarget = null;
    }
  }

  for (const p of allPlayers) {
    const d = dist(p, ball);

    if (!possession && d < PICKUP_RANGE && tackleCooldown <= 0 && p !== lastKicker) {
      possession = p;
      passTarget = null;
      ball.vx = 0; ball.vy = 0;
      return;
    }

    if (possession && possession !== p && possession.side !== p.side && p.tackleCooldown <= 0) {
      const dp = dist(p, possession);
      const isDirectedTackle = p.tackleTarget === possession;
      const range = isDirectedTackle ? TACKLE_RANGE * 1.5 : TACKLE_RANGE;
      if (dp < range && (isDirectedTackle || tackleCooldown <= 0)) {
        const successRate = isDirectedTackle ? 0.95 : TACKLE_SUCCESS;
        p.tackleCooldown = 15;
        if (Math.random() < successRate) {
          const victim = possession;
          possession = p;
          tackleCooldown = 15;
          p.tackleTarget = null;
          victim.tackleCooldown = 120;
        } else {
          const dx2 = p.x - possession.x, dy2 = p.y - possession.y;
          const dd = Math.sqrt(dx2 * dx2 + dy2 * dy2) || 1;
          p.x += (dx2 / dd) * 8;
          p.y += (dy2 / dd) * 8;
          p.tackleCooldown = 30;
          p.tackleTarget = null;
        }
      }
    }
  }
}

function updateBall() {
  if (possession || goalScored) return;
  ball.x += ball.vx * GAME_SPEED;
  ball.y += ball.vy * GAME_SPEED;
  ball.vx *= ball.friction;
  ball.vy *= ball.friction;
  if (Math.abs(ball.vx) < 0.05 && Math.abs(ball.vy) < 0.05) { ball.vx = 0; ball.vy = 0; }

  if (ball.y < ball.radius) { ball.y = ball.radius; ball.vy *= -0.7; }
  if (ball.y > H - ball.radius) { ball.y = H - ball.radius; ball.vy *= -0.7; }

  if (ball.x <= ball.radius + GOAL_W && ball.y > GOAL_Y && ball.y < GOAL_Y + GOAL_H) {
    score[1]++; goalFlash = 60; goalScored = true;
    document.getElementById('score').textContent = `${score[0]} : ${score[1]}`;
    ball.vx = 0; ball.vy = 0;
    setTimeout(resetAfterGoal, 1200);
    return;
  }
  if (ball.x >= W - ball.radius - GOAL_W && ball.y > GOAL_Y && ball.y < GOAL_Y + GOAL_H) {
    score[0]++; goalFlash = 60; goalScored = true;
    document.getElementById('score').textContent = `${score[0]} : ${score[1]}`;
    ball.vx = 0; ball.vy = 0;
    setTimeout(resetAfterGoal, 1200);
    return;
  }

  if (ball.x < ball.radius) { ball.x = ball.radius; ball.vx *= -0.7; }
  if (ball.x > W - ball.radius) { ball.x = W - ball.radius; ball.vx *= -0.7; }
}

function checkGoalInPossession() {
  if (!possession || goalScored) return;
  if (ball.x <= GOAL_W + ball.radius && ball.y > GOAL_Y && ball.y < GOAL_Y + GOAL_H) {
    score[1]++; goalFlash = 60; goalScored = true;
    document.getElementById('score').textContent = `${score[0]} : ${score[1]}`;
    possession = null;
    setTimeout(resetAfterGoal, 1200);
  }
  if (ball.x >= W - GOAL_W - ball.radius && ball.y > GOAL_Y && ball.y < GOAL_Y + GOAL_H) {
    score[0]++; goalFlash = 60; goalScored = true;
    document.getElementById('score').textContent = `${score[0]} : ${score[1]}`;
    possession = null;
    setTimeout(resetAfterGoal, 1200);
  }
}

// --- Drawing ---
function drawField() {
  ctx.fillStyle = '#2d8a4e';
  ctx.fillRect(0, 0, W, H);
  for (let i = 0; i < W; i += 60) {
    ctx.fillStyle = i % 120 === 0 ? '#2d8a4e' : '#278a46';
    ctx.fillRect(i, 0, 60, H);
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(W / 2, 0); ctx.lineTo(W / 2, H); ctx.stroke();
  ctx.beginPath(); ctx.arc(W / 2, H / 2, 80, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.arc(W / 2, H / 2, 4, 0, Math.PI * 2); ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.fill();
  const paW = 150, paH = 350, paY = (H - paH) / 2;
  ctx.strokeRect(0, paY, paW, paH); ctx.strokeRect(W - paW, paY, paW, paH);
  const gaW = 50, gaH = 200, gaY = (H - gaH) / 2;
  ctx.strokeRect(0, gaY, gaW, gaH); ctx.strokeRect(W - gaW, gaY, gaW, gaH);
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(0, GOAL_Y, GOAL_W, GOAL_H); ctx.fillRect(W - GOAL_W, GOAL_Y, GOAL_W, GOAL_H);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, GOAL_Y - 3, GOAL_W, 6); ctx.fillRect(0, GOAL_Y + GOAL_H - 3, GOAL_W, 6);
  ctx.fillRect(W - GOAL_W, GOAL_Y - 3, GOAL_W, 6); ctx.fillRect(W - GOAL_W, GOAL_Y + GOAL_H - 3, GOAL_W, 6);
}

function drawPlayer(p, color) {
  const hasBall = possession === p;

  // During plan phase, show move radius for selected player
  if (phase === 'plan' && p === selected && p.side === 0) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, MOVE_RADIUS, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,235,59,0.07)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,235,59,0.25)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Selection ring
  if (p === selected) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius + 5, 0, Math.PI * 2);
    ctx.strokeStyle = '#ffeb3b';
    ctx.lineWidth = 3;
    ctx.stroke();
  }

  // Show planned move target (during plan phase for team A)
  if (phase === 'plan' && p.side === 0 && p.hasOrder) {
    const dx = p.tx - p.x, dy = p.ty - p.y;
    if (Math.sqrt(dx * dx + dy * dy) > 5) {
      // Target dot
      ctx.beginPath();
      ctx.arc(p.tx, p.ty, 6, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,235,59,0.6)';
      ctx.lineWidth = 2;
      ctx.stroke();
      // Arrow line
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.tx, p.ty);
      ctx.strokeStyle = 'rgba(255,235,59,0.4)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.setLineDash([]);
    }
    // Show tackle icon
    if (p.tackleTarget) {
      ctx.fillStyle = 'rgba(255,100,100,0.9)';
      ctx.font = 'bold 12px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('T', p.x, p.y - p.radius - 8);
    }
  }

  // Show planned pass/kick
  if (phase === 'plan' && p.side === 0 && p.plannedPass) {
    const {x: tx, y: ty} = p.plannedPass;
    // passFirst: line from current pos; dribble-then-pass: line from dribble dest
    const hasDribble = p.hasOrder && (Math.abs(p.tx - p.x) > 5 || Math.abs(p.ty - p.y) > 5);
    const sx = (hasDribble && !p.passFirst) ? p.tx : p.x;
    const sy = (hasDribble && !p.passFirst) ? p.ty : p.y;
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(tx, ty);
    ctx.strokeStyle = 'rgba(100,200,255,0.6)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.arc(tx, ty, 5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(100,200,255,0.6)';
    ctx.fill();
  }

  // Possession glow
  if (hasBall) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius + 8, 0, Math.PI * 2);
    ctx.strokeStyle = p.side === 0 ? 'rgba(33,150,243,0.5)' : 'rgba(244,67,54,0.5)';
    ctx.lineWidth = 3;
    ctx.stroke();
  }

  // "Has order" indicator
  if (phase === 'plan' && p.side === 0 && p.hasOrder) {
    ctx.beginPath();
    ctx.arc(p.x + p.radius + 3, p.y - p.radius - 3, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#4CAF50';
    ctx.fill();
  }

  // Shadow
  ctx.beginPath();
  ctx.ellipse(p.x + 2, p.y + 4, p.radius, p.radius * 0.5, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fill();

  // Player body
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Jersey number
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(p.index + 1, p.x, p.y);
}

function drawBall() {
  ctx.beginPath();
  ctx.ellipse(ball.x + 2, ball.y + 3, ball.radius + 1, ball.radius * 0.5, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius * 0.45, 0, Math.PI * 2);
  ctx.fillStyle = '#333';
  ctx.fill();
}

function drawDragLine() {
  if (!dragging || !dragMouse || !dragActive) return;
  const isPass = dragButton === 2;
  const color = isPass ? 'rgba(100,200,255,0.8)' : 'rgba(255,235,59,0.6)';

  // Start point: for pass, use dragStartPos (could be dribble target); for move, use player pos
  const startX = isPass ? dragStartPos.x : dragging.x;
  const startY = isPass ? dragStartPos.y : dragging.y;

  // For move, clamp visual to radius
  let tx = dragMouse.x, ty = dragMouse.y;
  if (!isPass) {
    const dx = dragMouse.x - dragging.x, dy = dragMouse.y - dragging.y;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d > MOVE_RADIUS) {
      tx = dragging.x + (dx / d) * MOVE_RADIUS;
      ty = dragging.y + (dy / d) * MOVE_RADIUS;
    }
  }

  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(startX, startY);
  ctx.lineTo(tx, ty);
  ctx.strokeStyle = color;
  ctx.lineWidth = 2.5;
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.arc(tx, ty, 5, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
}

function drawGoalFlash() {
  if (goalFlash <= 0) return;
  ctx.fillStyle = `rgba(255, 255, 100, ${goalFlash / 120})`;
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 72px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('GOAL!', W / 2, H / 2);
  goalFlash--;
}

// --- End of round ---
function endRound() {
  phase = 'plan';
  round++;
  playBtn.disabled = false;
  timerBar.style.display = 'none';
  selected = null;

  // Reset orders for next round
  for (const p of teamA) {
    p.hasOrder = false;
    p.tx = p.x;
    p.ty = p.y;
    p.tackleTarget = null;
    p.plannedPass = null;
    p.passFirst = false;
  }
  for (const p of teamB) {
    p.tx = p.x;
    p.ty = p.y;
    p.tackleTarget = null;
    p.plannedPass = null;
  }

  updateRoundInfo();
}

// --- Game loop ---
function update() {
  if (phase === 'play') {
    playTimer--;
    timerFill.style.width = ((PLAY_DURATION - playTimer) / PLAY_DURATION * 100) + '%';

    const allPlayers = [...teamA, ...teamB];
    for (const p of allPlayers) {
      p.tackleCooldown = Math.max(0, p.tackleCooldown - 1);
      movePlayer(p);
    }
    separatePlayers(allPlayers);
    handlePossession(allPlayers);
    updateBall();
    checkGoalInPossession();

    // Check if all actions are complete
    const allDone = allPlayers.every(p => {
      const dx = p.tx - p.x, dy = p.ty - p.y;
      const arrived = Math.sqrt(dx * dx + dy * dy) <= 3;
      const noPendingPass = !p.plannedPass;
      return arrived && noPendingPass;
    });
    const ballStopped = possession || (Math.abs(ball.vx) < 0.2 && Math.abs(ball.vy) < 0.2);

    if ((allDone && ballStopped) || playTimer <= 0) {
      endRound();
    }
  }

  // Auto-plan GK during plan phase
  if (phase === 'plan') {
    autoplanGK();
  }
}

function draw() {
  drawField();
  if (!possession) drawBall();

  // Sort all players by Y so lower ones draw on top
  const allSorted = [...teamA.map(p => ({p, color: '#2196F3'})), ...teamB.map(p => ({p, color: '#f44336'}))];
  allSorted.sort((a, b) => a.p.y - b.p.y);
  for (const {p, color} of allSorted) {
    drawPlayer(p, color);
    // Draw ball on top of the carrier immediately after drawing them
    if (possession === p) drawBall();
  }

  drawDragLine();
  drawGoalFlash();

  // Phase overlay during play
  if (phase === 'play') {
    ctx.fillStyle = 'rgba(0,0,0,0.03)';
    ctx.fillRect(0, 0, W, H);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

updateRoundInfo();

// Stadium ambience
const ambience = new Audio('stadium-sound.mp3');
ambience.loop = true;
ambience.volume = 0.3;
canvas.addEventListener('click', () => { if (ambience.paused) ambience.play(); }, { once: true });

loop();
</script>
