<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fussball Commander</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
  canvas { border: 2px solid #fff; cursor: crosshair; }
  #score {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    color: #fff; font: bold 28px monospace; text-shadow: 0 0 10px rgba(0,0,0,.8);
    z-index: 10; pointer-events: none;
  }
  #info {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: #aaa; font: 14px monospace; z-index: 10; pointer-events: none;
    text-align: center;
  }
  #speed-control {
    position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
    z-index: 10; display: flex; align-items: center; gap: 10px;
    color: #fff; font: 14px monospace;
  }
  #speed-control input { width: 160px; cursor: pointer; }
</style>
</head>
<body>
<div id="score">0 : 0</div>
<div id="speed-control">
  Speed: <input type="range" id="speedSlider" min="10" max="150" value="50"> <span id="speedLabel">50%</span>
</div>
<div id="info">Click player to select &bull; Click field to move/run with ball &bull; Right-click to kick ball to target</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// --- Field dimensions ---
const W = 1200, H = 750;
canvas.width = W; canvas.height = H;

const GOAL_W = 12;
const GOAL_H = 160;
const GOAL_Y = (H - GOAL_H) / 2;

// --- Game state ---
let score = [0, 0];
let selected = null;
let gameSpeed = 0.5;
let possession = null; // the player currently holding the ball
let tackleCooldown = 0; // global cooldown after a tackle to prevent instant re-steal
let passTarget = null; // intended receiver of a pass
let floatingTexts = []; // {x, y, text, timer}

const speedSlider = document.getElementById('speedSlider');
const speedLabel = document.getElementById('speedLabel');
speedSlider.addEventListener('input', () => {
  gameSpeed = speedSlider.value / 100;
  speedLabel.textContent = speedSlider.value + '%';
});
let goalFlash = 0;
let goalFlashSide = 0;

const TACKLE_RANGE = 30;
const TACKLE_SUCCESS = 0.45; // 45% chance per contact
const PICKUP_RANGE = 20;
const DRIBBLE_SPEED_PENALTY = 0.7; // slower when carrying ball

// --- Formation (4-4-2) relative positions [0-1] ---
const formation = [
  [0.08, 0.5],   // GK
  [0.2, 0.15],   // DEF
  [0.2, 0.38],
  [0.2, 0.62],
  [0.2, 0.85],
  [0.4, 0.15],   // MID
  [0.4, 0.38],
  [0.4, 0.62],
  [0.4, 0.85],
  [0.6, 0.35],   // FWD
  [0.6, 0.65],
];

function createTeam(side) {
  return formation.map((pos, i) => {
    const x = side === 0 ? pos[0] * W : W - pos[0] * W;
    const y = pos[1] * H;
    return {
      x, y, tx: x, ty: y,
      homeX: x, homeY: y,
      speed: i === 0 ? 1.5 : 1.8 + Math.random() * 0.4,
      radius: 14,
      side,
      index: i,
      tackleCooldown: 0,
    };
  });
}

let teamA = createTeam(0);
let teamB = createTeam(1);

const ball = {
  x: W / 2, y: H / 2,
  vx: 0, vy: 0,
  radius: 8,
  friction: 0.98,
};

function resetAfterGoal() {
  ball.x = W / 2; ball.y = H / 2;
  ball.vx = 0; ball.vy = 0;
  possession = null;
  passTarget = null;
  tackleCooldown = 0;
  teamA = createTeam(0);
  teamB = createTeam(1);
  selected = null;
}

// --- Kick ball (pass/shoot) ---
function kickBall(targetX, targetY, power) {
  const dx = targetX - ball.x, dy = targetY - ball.y;
  const dd = Math.sqrt(dx * dx + dy * dy);
  if (dd < 1) return;
  ball.vx = (dx / dd) * power;
  ball.vy = (dy / dd) * power;
  possession = null;
}

// --- Input ---
const keys = {};
window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

function updateWASD() {
  if (!selected) return;
  let dx = 0, dy = 0;
  if (keys['w']) dy -= 1;
  if (keys['s']) dy += 1;
  if (keys['a']) dx -= 1;
  if (keys['d']) dx += 1;
  if (dx === 0 && dy === 0) return;
  // Set target far in the direction so the player keeps moving
  const len = Math.sqrt(dx * dx + dy * dy);
  selected.tx = selected.x + (dx / len) * 200;
  selected.ty = selected.y + (dy / len) * 200;
}

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top) * (H / rect.height);

  // Try selecting a player from team A
  let clicked = null;
  for (const p of teamA) {
    const dx = p.x - mx, dy = p.y - my;
    if (Math.sqrt(dx * dx + dy * dy) < p.radius + 6) {
      clicked = p;
      break;
    }
  }

  if (clicked) {
    // If selected player has the ball and we click a teammate → pass
    if (selected && possession === selected && clicked !== selected) {
      // Scale power by distance so ball always reaches the target
      const passDist = dist(selected, clicked);
      const power = Math.max(5, passDist / 18);
      kickBall(clicked.x, clicked.y, power);
      passTarget = clicked;
      selected = clicked;
      return;
    }
    selected = clicked;
  } else if (selected) {
    // Check if clicking on an enemy player who has the ball → tackle command
    let targetEnemy = null;
    for (const p of teamB) {
      const dx = p.x - mx, dy = p.y - my;
      if (Math.sqrt(dx * dx + dy * dy) < p.radius + 6) {
        targetEnemy = p;
        break;
      }
    }

    if (targetEnemy && possession === targetEnemy) {
      // Send selected player to tackle the ball carrier
      selected.tackleTarget = targetEnemy;
      selected.tx = targetEnemy.x;
      selected.ty = targetEnemy.y;
      floatingTexts.push({ x: mx + 15, y: my - 10, text: 'T', timer: 180 });
    } else {
      selected.tackleTarget = null;
      selected.tx = mx;
      selected.ty = my;
    }
  }
});

// Right-click to kick/pass the ball
canvas.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top) * (H / rect.height);

  // Only kick if a team A player has possession
  if (possession && possession.side === 0) {
    kickBall(mx, my, 5 + Math.random() * 2);
  }
});

// --- AI ---
function updateAI() {
  // Find who on team B is closest to the ball
  const closestToBall = teamB.reduce((best, p) => {
    const d = dist(p, ball);
    return d < best.d ? { p, d } : best;
  }, { p: null, d: Infinity });

  for (const p of teamB) {
    p.tackleCooldown = Math.max(0, p.tackleCooldown - 1);

    if (possession && possession.side === 1 && possession === p) {
      // This AI player has the ball — run toward opponent goal
      const goalX = 20;
      const goalY = H / 2 + (Math.random() - 0.5) * 40;
      p.tx = goalX;
      p.ty = goalY;

      // If close enough to goal, shoot
      if (p.x < 180) {
        kickBall(10, H / 2 + (Math.random() - 0.5) * GOAL_H * 0.7, 5 + Math.random() * 2);
      }
    } else if (possession && possession.side === 0) {
      // Team A has ball — defenders/mids try to intercept carrier
      if (p === closestToBall.p || (p.index >= 1 && p.index <= 4 && dist(p, possession) < 300)) {
        p.tx = possession.x;
        p.ty = possession.y;
      } else if (p.index === 0) {
        p.tx = p.homeX;
        p.ty = clamp(ball.y, GOAL_Y + 20, GOAL_Y + GOAL_H - 20);
      } else {
        const bx = (ball.x / W - 0.5) * 150;
        const by = (ball.y / H - 0.5) * 80;
        p.tx = p.homeX + bx;
        p.ty = p.homeY + by;
      }
    } else if (!possession) {
      // Ball is loose
      if (p === closestToBall.p || (p.index >= 9 && dist(p, ball) < 250)) {
        p.tx = ball.x + ball.vx * 10;
        p.ty = ball.y + ball.vy * 10;
      } else if (p.index === 0) {
        p.tx = p.homeX;
        p.ty = clamp(ball.y, GOAL_Y + 20, GOAL_Y + GOAL_H - 20);
      } else {
        const bx = (ball.x / W - 0.5) * 150;
        const by = (ball.y / H - 0.5) * 80;
        p.tx = p.homeX + bx;
        p.ty = p.homeY + by;
      }
    } else {
      // Team B has ball but not this player — support run
      if (p.index === 0) {
        p.tx = p.homeX;
        p.ty = clamp(ball.y, GOAL_Y + 20, GOAL_Y + GOAL_H - 20);
      } else {
        // Move forward in support
        const bx = (ball.x / W - 0.5) * 200;
        const by = (ball.y / H - 0.5) * 80;
        p.tx = p.homeX + bx - 60;
        p.ty = p.homeY + by;
      }
    }
  }
}

// --- Player GK AI for team A ---
function updatePlayerGK() {
  const gk = teamA[0];
  if (selected === gk) return;
  gk.tx = gk.homeX;
  gk.ty = clamp(ball.y, GOAL_Y + 20, GOAL_Y + GOAL_H - 20);
}

// --- Physics ---
function dist(a, b) {
  const dx = a.x - b.x, dy = a.y - b.y;
  return Math.sqrt(dx * dx + dy * dy);
}

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function movePlayer(p) {
  // If chasing a tackle target, keep updating destination to track them
  if (p.tackleTarget) {
    if (possession === p.tackleTarget) {
      p.tx = p.tackleTarget.x;
      p.ty = p.tackleTarget.y;
    } else {
      p.tackleTarget = null; // target lost the ball, cancel
    }
  }

  const dx = p.tx - p.x, dy = p.ty - p.y;
  const d = Math.sqrt(dx * dx + dy * dy);
  if (d > 2) {
    let spd = p.speed * gameSpeed;
    if (possession === p) spd *= DRIBBLE_SPEED_PENALTY;
    p.x += (dx / d) * spd;
    p.y += (dy / d) * spd;
  }
  p.x = clamp(p.x, p.radius, W - p.radius);
  p.y = clamp(p.y, p.radius, H - p.radius);

  // If this player has possession, ball follows them
  if (possession === p) {
    // Ball slightly in front of player (based on movement direction)
    if (d > 2) {
      ball.x = p.x + (dx / d) * (p.radius + ball.radius + 2);
      ball.y = p.y + (dy / d) * (p.radius + ball.radius + 2);
    } else {
      ball.x = p.x + p.radius + ball.radius + 2;
      ball.y = p.y;
    }
    ball.vx = 0;
    ball.vy = 0;
  }
}

// --- Possession & tackling ---
function handlePossession(allPlayers) {
  tackleCooldown = Math.max(0, tackleCooldown - 1);

  // Pass target gets priority pickup with a generous range
  if (!possession && passTarget) {
    const d = dist(passTarget, ball);
    if (d < PICKUP_RANGE * 2) {
      possession = passTarget;
      ball.vx = 0; ball.vy = 0;
      passTarget = null;
      return;
    }
    // If ball stopped and missed the target, clear it
    if (Math.abs(ball.vx) < 0.1 && Math.abs(ball.vy) < 0.1) {
      passTarget = null;
    }
  }

  for (const p of allPlayers) {
    const d = dist(p, ball);

    // Pick up loose ball
    if (!possession && d < PICKUP_RANGE && tackleCooldown <= 0) {
      possession = p;
      passTarget = null;
      ball.vx = 0; ball.vy = 0;
      return;
    }

    // Tackle: opponent approaches player with ball
    if (possession && possession !== p && possession.side !== p.side && p.tackleCooldown <= 0) {
      const dp = dist(p, possession);
      const isDirectedTackle = p.tackleTarget === possession;

      // Directed tackles: bigger range, ignore global cooldown, higher success
      const range = isDirectedTackle ? TACKLE_RANGE * 1.5 : TACKLE_RANGE;
      if (dp < range && (isDirectedTackle || tackleCooldown <= 0)) {
        const successRate = isDirectedTackle ? 0.95 : TACKLE_SUCCESS;

        p.tackleCooldown = 15;
        if (Math.random() < successRate) {
          const victim = possession;
          possession = p;
          tackleCooldown = 15;
          p.tackleTarget = null;
          victim.tackleCooldown = 120; // tackled player waits ~2s at 60fps
        } else {
          const dx = p.x - possession.x, dy = p.y - possession.y;
          const dd = Math.sqrt(dx * dx + dy * dy) || 1;
          p.x += (dx / dd) * 8;
          p.y += (dy / dd) * 8;
          p.tackleCooldown = 30;
          p.tackleTarget = null;
        }
      }
    }
  }
}

function updateBall() {
  if (possession) return; // ball is glued to a player

  ball.x += ball.vx * gameSpeed;
  ball.y += ball.vy * gameSpeed;
  ball.vx *= ball.friction;
  ball.vy *= ball.friction;

  // Stop very slow ball
  if (Math.abs(ball.vx) < 0.05 && Math.abs(ball.vy) < 0.05) {
    ball.vx = 0; ball.vy = 0;
  }

  // Bounce off top/bottom
  if (ball.y < ball.radius) { ball.y = ball.radius; ball.vy *= -0.7; }
  if (ball.y > H - ball.radius) { ball.y = H - ball.radius; ball.vy *= -0.7; }

  // Goal detection
  if (ball.x <= ball.radius + GOAL_W && ball.y > GOAL_Y && ball.y < GOAL_Y + GOAL_H) {
    score[1]++;
    goalFlash = 60; goalFlashSide = 1;
    document.getElementById('score').textContent = `${score[0]} : ${score[1]}`;
    setTimeout(resetAfterGoal, 1200);
    ball.vx = 0; ball.vy = 0;
    return;
  }
  if (ball.x >= W - ball.radius - GOAL_W && ball.y > GOAL_Y && ball.y < GOAL_Y + GOAL_H) {
    score[0]++;
    goalFlash = 60; goalFlashSide = 0;
    document.getElementById('score').textContent = `${score[0]} : ${score[1]}`;
    setTimeout(resetAfterGoal, 1200);
    ball.vx = 0; ball.vy = 0;
    return;
  }

  // Bounce off left/right walls
  if (ball.x < ball.radius) { ball.x = ball.radius; ball.vx *= -0.7; }
  if (ball.x > W - ball.radius) { ball.x = W - ball.radius; ball.vx *= -0.7; }
}

// --- Drawing ---
function drawField() {
  ctx.fillStyle = '#2d8a4e';
  ctx.fillRect(0, 0, W, H);

  for (let i = 0; i < W; i += 60) {
    ctx.fillStyle = i % 120 === 0 ? '#2d8a4e' : '#278a46';
    ctx.fillRect(i, 0, 60, H);
  }

  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 2;

  ctx.beginPath();
  ctx.moveTo(W / 2, 0);
  ctx.lineTo(W / 2, H);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(W / 2, H / 2, 80, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(W / 2, H / 2, 4, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fill();

  const paW = 150, paH = 350, paY = (H - paH) / 2;
  ctx.strokeRect(0, paY, paW, paH);
  ctx.strokeRect(W - paW, paY, paW, paH);

  const gaW = 50, gaH = 200, gaY = (H - gaH) / 2;
  ctx.strokeRect(0, gaY, gaW, gaH);
  ctx.strokeRect(W - gaW, gaY, gaW, gaH);

  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(0, GOAL_Y, GOAL_W, GOAL_H);
  ctx.fillRect(W - GOAL_W, GOAL_Y, GOAL_W, GOAL_H);

  ctx.fillStyle = '#fff';
  ctx.fillRect(0, GOAL_Y - 3, GOAL_W, 6);
  ctx.fillRect(0, GOAL_Y + GOAL_H - 3, GOAL_W, 6);
  ctx.fillRect(W - GOAL_W, GOAL_Y - 3, GOAL_W, 6);
  ctx.fillRect(W - GOAL_W, GOAL_Y + GOAL_H - 3, GOAL_W, 6);
}

function drawPlayer(p, color) {
  const hasBall = possession === p;

  // Selection ring
  if (p === selected) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius + 5, 0, Math.PI * 2);
    ctx.strokeStyle = '#ffeb3b';
    ctx.lineWidth = 3;
    ctx.stroke();

    const dx = p.tx - p.x, dy = p.ty - p.y;
    if (Math.sqrt(dx * dx + dy * dy) > 10) {
      ctx.beginPath();
      ctx.arc(p.tx, p.ty, 6, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,235,59,0.5)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.tx, p.ty);
      ctx.strokeStyle = 'rgba(255,235,59,0.3)';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // Possession glow
  if (hasBall) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius + 8, 0, Math.PI * 2);
    ctx.strokeStyle = p.side === 0 ? 'rgba(33,150,243,0.5)' : 'rgba(244,67,54,0.5)';
    ctx.lineWidth = 3;
    ctx.stroke();
  }

  // Shadow
  ctx.beginPath();
  ctx.ellipse(p.x + 2, p.y + 4, p.radius, p.radius * 0.5, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fill();

  // Player body
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Jersey number
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(p.index + 1, p.x, p.y);
}

function drawBall() {
  ctx.beginPath();
  ctx.ellipse(ball.x + 2, ball.y + 3, ball.radius + 1, ball.radius * 0.5, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fill();

  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius * 0.45, 0, Math.PI * 2);
  ctx.fillStyle = '#333';
  ctx.fill();
}

function drawGoalFlash() {
  if (goalFlash <= 0) return;
  ctx.fillStyle = `rgba(255, 255, 100, ${goalFlash / 120})`;
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 72px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('GOAL!', W / 2, H / 2);
  goalFlash--;
}

// --- Game loop ---
function update() {
  updateWASD();
  updateAI();
  updatePlayerGK();

  const allPlayers = [...teamA, ...teamB];

  for (const p of allPlayers) {
    movePlayer(p);
  }

  handlePossession(allPlayers);
  updateBall();

  // Goal scored by running ball into net while in possession
  if (possession) {
    if (ball.x <= GOAL_W + ball.radius && ball.y > GOAL_Y && ball.y < GOAL_Y + GOAL_H) {
      score[1]++;
      goalFlash = 60;
      document.getElementById('score').textContent = `${score[0]} : ${score[1]}`;
      possession = null;
      setTimeout(resetAfterGoal, 1200);
    }
    if (ball.x >= W - GOAL_W - ball.radius && ball.y > GOAL_Y && ball.y < GOAL_Y + GOAL_H) {
      score[0]++;
      goalFlash = 60;
      document.getElementById('score').textContent = `${score[0]} : ${score[1]}`;
      possession = null;
      setTimeout(resetAfterGoal, 1200);
    }
  }
}

function drawFloatingTexts() {
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.timer--;
    if (ft.timer <= 0) { floatingTexts.splice(i, 1); continue; }
    const alpha = Math.min(1, ft.timer / 60);
    ctx.fillStyle = `rgba(255, 255, 0, ${alpha})`;
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(ft.text, ft.x, ft.y);
    ft.y -= 0.3; // drift up slowly
  }
}

function draw() {
  drawField();
  for (const p of teamA) drawPlayer(p, '#2196F3');
  for (const p of teamB) drawPlayer(p, '#f44336');
  drawBall();
  drawFloatingTexts();
  drawGoalFlash();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
